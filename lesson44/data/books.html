<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Office Booklender</title>
    <link rel="stylesheet" href="css/freemarker.css">
</head>
<body>
<div class="container">
    <h1>Список книг в офисе</h1>
    <div class="flex-col">
        <#list books as book>
        <div class="row flex" style="border-bottom: 1px solid #ccc; padding: 10px;">
            <div class="column">
                <img src="${book.image}" alt="${book.title}" style="width: 50px;">
            </div>
            <div class="column">
                <strong>${book.title}</strong><br>
                <small>${book.author}</small>
            </div>
            <div class="column">
                <strong>Статус:</strong>
                <span style="color: ${ (book.status == 'AVAILABLE')?string('green', 'red') }">
                    ${book.status}
                </span>
                <#if book.status == "AVAILABLE">
                <form action="/books/borrow" method="post" style="margin-top: 10px;">
                    <input type="hidden" name="bookId" value="${book.id}">
                    <button type="submit" style="background-color: #4CAF50; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">
                        Взять книгу
                    </button>
                </form>
                <#else>
                <form action="/books/return" method="post" style="margin-top: 10px;">
                    <input type="hidden" name="bookId" value="${book.id}">
                    <button type="submit" style="background-color: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">
                        Вернуть книгу
                    </button>
                </form>
            </#if>
        </div>
        </div>
    </#list>
</div>
</div>
</body>
</html>
